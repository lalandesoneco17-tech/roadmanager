<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8fafc;color:#1e293b}
input,select,textarea,button{font-family:inherit;font-size:inherit}
@media(max-width:768px){
  .mob-btn{display:block!important}
  .sb{position:fixed!important;left:-170px!important;top:0;height:100vh;transition:left .25s;z-index:200!important}
  .sb.open{left:0!important}
  .main{padding:8px!important;padding-top:44px!important;margin-left:0!important}
  .pg{grid-template-columns:1fr!important}
  .grid-cards{grid-template-columns:1fr!important}
  .sb-overlay{display:block!important}
}
@media(min-width:769px){
  .mob-btn{display:none!important}
  .sb-overlay{display:none!important}
}
</style>
</head>

<script>

// localStorage fallback
if(!window.storage||typeof window.storage.get!=='function'){
window.storage={
get:function(k){try{return Promise.resolve(localStorage.getItem(k))}catch(e){return Promise.resolve(null)}},
set:function(k,v){try{localStorage.setItem(k,v)}catch(e){}return Promise.resolve()}
};
}
